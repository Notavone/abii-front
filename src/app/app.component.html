<div class="flex flex-col h-screen">
  <mat-toolbar role="heading" color="primary">
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="grow"></span>
    <span class="truncate ml-1">Association Belfortaine des Informaticiens de l'IUT</span>
  </mat-toolbar>
  <mat-sidenav-container>
    <mat-sidenav #sidenav class="w-screen sm:w-fit px-5 sidenav">
      <mat-nav-list>
        <a (click)="sidenav.close()"
           mat-list-item routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
          <mat-icon mat-list-icon>home</mat-icon>
          <span mat-line>Accueil</span>
        </a>

        <a *ngIf="isLoggedIn() && hasManageRights()" (click)="sidenav.close()"
           mat-list-item routerLink="/clients" routerLinkActive="active">
          <mat-icon mat-list-icon>supervised_user_circle</mat-icon>
          <span mat-line>Clients</span>
        </a>

        <a *ngIf="isLoggedIn() && hasManageRights()" (click)="sidenav.close()"
           mat-list-item routerLink="/users" routerLinkActive="active">
          <mat-icon mat-list-icon>account_circle</mat-icon>
          <span mat-line>Utilisateurs</span>
        </a>

        <a *ngIf="isLoggedIn() && hasManageRights()" (click)="sidenav.close()"
           mat-list-item routerLink="/products" routerLinkActive="active">
          <mat-icon mat-list-icon>fastfood</mat-icon>
          <span mat-line>Produits</span>
        </a>

        <a *ngIf="isLoggedIn() && hasManageRights()" (click)="sidenav.close()"
           mat-list-item routerLink="/orders" routerLinkActive="active">
          <mat-icon mat-list-icon>bookmark_order</mat-icon>
          <span mat-line>Commandes</span>
        </a>

        <a *ngIf="isLoggedIn() && hasManageRights()" (click)="sidenav.close()"
        mat-list-item routerLink="/stock" routerLinkActive="active">
          <mat-icon mat-list-icon>remove_shopping_cart</mat-icon>
          <span mat-line>Gestion Stock</span>
        </a>

        <a *ngIf="isLoggedIn()" (click)="sidenav.close()"
           mat-list-item [routerLink]="'/users/' + userId" routerLinkActive="active">
          <mat-icon mat-list-icon>account_box</mat-icon>
          <span mat-line>Profil</span>
        </a>

        <a *ngIf="isLoggedIn()" (click)="logout(); sidenav.close()" mat-list-item>
          <mat-icon mat-list-icon>directions_run</mat-icon>
          <span mat-line>Déconnexion</span>
        </a>

        <a *ngIf="!isLoggedIn()" (click)="sidenav.close()"
           mat-list-item routerLink="/login" routerLinkActive="active">
          <mat-icon mat-list-icon>directions_run</mat-icon>
          <span mat-line>Connexion</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
