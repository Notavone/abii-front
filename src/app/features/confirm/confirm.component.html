<h2 mat-dialog-title>{{data.title ?? 'Demande de confirmation'}}</h2>
<mat-dialog-content>
  {{data.message ?? 'Êtes-vous sûr de vouloir confirmer cette action ?'}}
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button mat-dialog-close="" color="{{data.confirmButtonColor ?? 'accent'}}" (click)="cancel()">
    {{data.cancelButtonText ?? 'Annuler'}}
  </button>
  <button mat-raised-button mat-dialog-close="" color="{{data.cancelButtonColor ?? 'primary'}}" (click)="confirm()">
    {{data.confirmButtonText ?? 'Confirmer'}}
  </button>
</mat-dialog-actions>
