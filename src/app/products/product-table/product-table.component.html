<table mat-table [dataSource]="dataSet">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nom</th>
    <td mat-cell *matCellDef="let product"><a routerLink="/products/{{product._id}}" mat-button>{{product.name}}</a></td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Prix</th>
    <td mat-cell *matCellDef="let product">{{product.price | currency}}</td>
  </ng-container>

  <ng-container matColumnDef="discount">
    <th mat-header-cell *matHeaderCellDef>Prix des adhérents</th>
    <td mat-cell *matCellDef="let product">{{product.price - product.price * product.discount / 100 | currency}}</td>
  </ng-container>

  <ng-container matColumnDef="available">
    <th mat-header-cell *matHeaderCellDef>Disponibilité</th>
    <td mat-cell *matCellDef="let product"><button mat-icon-button (click)="toggleAvailability(product)"><mat-icon>{{product.available ? "check_box" : "check_box_outline_blank"}}</mat-icon></button></td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
  <tr mat-row *matRowDef="let product; columns: columnsToDisplay"></tr>

</table>
