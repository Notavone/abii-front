<table mat-table [dataSource]="products">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>Id</th>
    <td mat-cell *matCellDef="let product">{{product._id}}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nom</th>
    <td mat-cell *matCellDef="let product"><a routerLink="/products/{{product._id}}">{{product.name}}</a></td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Prix</th>
    <td mat-cell *matCellDef="let product">{{product.price | currency:'EUR':'symbol':"1.2-2"}}</td>
  </ng-container>

  <ng-container matColumnDef="discount">
    <th mat-header-cell *matHeaderCellDef>Prix des adhérents</th>
    <td mat-cell *matCellDef="let product">{{product.price - product.price * product.discount / 100 | currency:'EUR':'symbol':"1.2-2"}}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
  <tr mat-row *matRowDef="let product; columns: columnsToDisplay"></tr>

</table>
