<h2 mat-dialog-title>{{data.title}}</h2>
<mat-dialog-content>
  {{data.text}}
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button [mat-dialog-close]="false">Fermer</button>
  <button mat-raised-button [mat-dialog-close]="true" color="primary">{{data.confirm ?? "Confirmer"}}</button>
</mat-dialog-actions>
