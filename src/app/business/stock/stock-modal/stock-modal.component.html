<mat-dialog-content>
  <h2 mat-dialog-title>Historique de stock pour le produit "{{product.name}}"</h2>
  <table mat-table [dataSource]="dataSource" matSort matSortActive="createdAt" matSortDirection="desc" matSortDisableClear>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="">Date</th>
      <td mat-cell *matCellDef="let stock">{{stock.createdAt | date:'dd/MM/yy hh:mm'}}</td>
    </ng-container>

    <ng-container matColumnDef="user">
      <th mat-header-cell *matHeaderCellDef>Utilisateur</th>
      <td mat-cell *matCellDef="let stock">{{stock.user?.name ?? '??'}}</td>
    </ng-container>

    <ng-container matColumnDef="difference">
      <th mat-header-cell *matHeaderCellDef>Différence</th>
      <td mat-cell *matCellDef="let stock">{{stock.difference | number}}</td>
    </ng-container>

    <ng-container matColumnDef="before">
      <th mat-header-cell *matHeaderCellDef class="hide-on-mobile">Ancien stock</th>
      <td mat-cell *matCellDef="let stock" class="hide-on-mobile">{{stock.previousStock | number}}</td>
    </ng-container>

    <ng-container matColumnDef="after">
      <th mat-header-cell *matHeaderCellDef class="hide-on-mobile">Nouveau stock</th>
      <td mat-cell *matCellDef="let stock" class="hide-on-mobile">{{stock.newStock | number}}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
    <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>
  </table>
  <mat-paginator #paginator></mat-paginator>
</mat-dialog-content>
