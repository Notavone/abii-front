<mat-card>
  <mat-card-header>
    <mat-card-title>Se connecter</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form (submit)="login()">
      <p>
        <mat-form-field>
          <mat-label>Email</mat-label>
          <input type="email" matNativeControl [(ngModel)]="email" name="email" placeholder="Email" autocomplete="username">
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Mot de passe</mat-label>
          <input type="password" matNativeControl [(ngModel)]="password" name="password" placeholder="Mot de passe" autocomplete="current-password">
        </mat-form-field>
      </p>

      <button mat-raised-button color="primary" type="submit">Connexion</button>
    </form>
  </mat-card-content>
</mat-card>
