<div *ngIf="client">
  <mat-tab-group>
    <mat-tab label="Paramètres">
      <mat-card>
        <mat-card-header>
          <mat-card-title>Mettre à jour "{{client.name}}"</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>
            <mat-form-field>
              <mat-label>Nom</mat-label>
              <input type="text" matNativeControl required placeholder="Nom" [(ngModel)]="client.name">
            </mat-form-field>
          </p>

          <p>Solde: {{client.balance | currency:"EUR":"symbol":"2.2-2"}}</p>
          <p>Fin de l'adhésion: {{client.subscriptionEnd ? (client.subscriptionEnd | date:"dd/MM/yyyy") : "N/A" }}</p>


        </mat-card-content>
        <mat-card-actions>
          <div>
            <button mat-raised-button color="warn" (click)="setStatus(status.NONE)">Retirer l'adhésion</button>
            <button mat-raised-button color="primary" (click)="setStatus(status.SEMESTER)">Adhésion 1 semestre</button>
            <button mat-raised-button color="primary" (click)="setStatus(status.ANNUAL)">Adhésion 1 année</button>
          </div>
          <div>
            <button mat-raised-button color="accent" (click)="goBack()">Retour</button>
            <button mat-raised-button color="primary" (click)="update()">Mettre à jour</button>
            <button mat-raised-button color="warn" (click)="delete()">Supprimer</button>
          </div>
        </mat-card-actions>
      </mat-card>
      <app-client-balance-form [client]="client"></app-client-balance-form>
      <app-client-buy-form [client]="client"></app-client-buy-form>
    </mat-tab>
    <mat-tab label="Historique">
      <app-client-orders [client]="client"></app-client-orders>
    </mat-tab>
  </mat-tab-group>
</div>
