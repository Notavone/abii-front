<mat-card>
  <mat-card-header>
    <mat-card-title>Ajouter un client</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>
      <mat-form-field>
        <mat-label>Nom</mat-label>
        <input type="text" matNativeControl required placeholder="Nom du produit" [(ngModel)]="client.name">
      </mat-form-field>
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="save()">Créer</button>
  </mat-card-actions>
</mat-card>
