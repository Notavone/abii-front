<mat-tab-group>
  <mat-tab label="Liste">
    <mat-form-field>
      <mat-label>Trier</mat-label>
      <input type="text" matNativeControl [(ngModel)]="filter" placeholder="Trier">
    </mat-form-field>

    <table mat-table [dataSource]="dataSet">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let client"><a routerLink="/clients/{{client._id}}/params" mat-button>{{client.name}}</a></td>
      </ng-container>

      <ng-container matColumnDef="subscription">
        <th mat-header-cell *matHeaderCellDef>Fin de l'adhésion le</th>
        <td mat-cell *matCellDef="let client">{{ client.subscriptionEnd ? (client.subscriptionEnd | date:"dd/MM/yyyy") : "N/A" }} </td>
      </ng-container>

      <ng-container matColumnDef="balance">
        <th mat-header-cell *matHeaderCellDef>Solde</th>
        <td mat-cell *matCellDef="let client">{{client.balance | currency}}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let client; columns: columnsToDisplay"></tr>

    </table>
    <mat-paginator #paginator showFirstLastButtons [pageSizeOptions]="[10, 25, 50]"></mat-paginator>
  </mat-tab>
  <mat-tab label="Ajouter">
    <app-client-create-form></app-client-create-form>
  </mat-tab>
</mat-tab-group>
