<mat-form-field>
  <mat-label>Période</mat-label>
  <mat-date-range-input [rangePicker]="picker" required>
    <input matStartDate placeholder="Start date" [(ngModel)]="start" (dateChange)="handleChange()">
    <input matEndDate placeholder="End date" [(ngModel)]="end" (dateChange)="handleChange()">
  </mat-date-range-input>
  <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-date-range-picker #picker></mat-date-range-picker>
</mat-form-field>

<mat-form-field>
  <mat-label>Filtrer par client</mat-label>
  <mat-select [(ngModel)]="selectedClient" (selectionChange)="handleChange()">
    <mat-option>NE PAS FILTRER</mat-option>
    <mat-option *ngFor="let client of clients" [value]="client">{{client.name}}</mat-option>
  </mat-select>
</mat-form-field>

<mat-form-field>
  <mat-label>Filtrer par produit</mat-label>
  <mat-select [(ngModel)]="selectedProduct" (selectionChange)="handleChange()">
    <mat-option>NE PAS FILTRER</mat-option>
    <mat-option *ngFor="let product of products" [value]="product">{{product.name}}</mat-option>
  </mat-select>
</mat-form-field>

<p *ngIf="total">Total pour la période sélectionné : {{total | currency}}</p>
<app-orders-table [orders]="orders"></app-orders-table>
