name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Donne les permissions nécessaires pour publier l'image sur GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère le code du dépôt
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configure Docker Buildx (indispensable pour les builds modernes et la mise en cache)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3  # <--- Correction ici (docker/ au lieu de actions/)

    # 3. Connexion au registre GitHub (uniquement si ce n'est pas une Pull Request)
    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 4. Génération automatique des tags intelligents (ex: master, sha-12345, latest)
    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=sha,format=short
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

    # 5. Build ET Push
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        # Remplacement de id.meta par steps.meta ici :
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
